# Servidor
# =============================================
server.port=8080
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.data.jdbc.JdbcRepositoriesAutoConfiguration
spring.web.resources.static-locations=classpath:/static/



# Compresión HTTP gzip:
# El endpoint /retenciones/pendientes devuelve ~6.400 facturas cada 60s.
# Con gzip el payload baja ~80%, acelerando la carga inicial y los
# auto-refresh. Es transparente: el navegador lo maneja solo.
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/css,application/javascript
server.compression.min-response-size=2048
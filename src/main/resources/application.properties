sybase.datasource.hikari.minimum-idle=1
sybase.datasource.hikari.max-lifetime=120000
sybase.datasource.hikari.idle-timeout=60000
sybase.datasource.hikari.connection-timeout=30000
sybase.datasource.hikari.keepalive-time=60000
sybase.datasource.hikari.validation-timeout=5000

